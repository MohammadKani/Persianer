<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persianer — Options Preview (mock data)</title>
  <link rel="stylesheet" href="options.css">
  <style>
    /* Local-only tweak: shrink main padding a bit so we can see the cards
       alongside the sidebar in a single viewport. */
    .main {
      padding: 20px 28px;
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button type="button" class="sidebar-home" id="sidebar-home" title="بازگشت به خانه" aria-label="بازگشت به خانه">
          <img src="icons/icon128.png" alt="" class="sidebar-home-icon">
          <span class="brand">Persianer</span>
        </button>
      </div>
      <div class="sidebar-list" id="profile-list"></div>
      <button class="new-profile-btn" id="new-profile-btn">+ پروفایل جدید</button>
    </aside>

    <!-- Main form -->
    <main class="main">
      <header class="main-header">
        <h2 id="form-title">پروفایل‌ها</h2>
        <span id="form-badge space-to-end" class="form-badge hidden     "></span>
        <button type="button" class="back-btn hidden" id="back-btn" title="بازگشت به لیست پروفایل‌ها"
          aria-label="بازگشت">
          بازگشت
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1);">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </header>

      <div id="profile-cards" class="profile-cards">
        <div class="profile-cards-header">
          <p class="profile-cards-sub">برای ویرایش، روی هر کارت بزنید یا کارت «پروفایل جدید» را انتخاب کنید.</p>
        </div>
        <div class="profile-cards-grid" id="profile-cards-grid"></div>
      </div>

      <div id="form-empty" class="form-empty hidden">
        <p>برای ویرایش، یک پروفایل از لیست کنار انتخاب کنید یا «پروفایل جدید» بسازید.</p>
      </div>

      <form id="profile-form" class="profile-form hidden">
        <input type="hidden" id="field-id">
        <div class="form-actions form-actions-top">
          <button type="submit" class="btn btn-primary" id="save-btn">ذخیره</button>
          <span id="unsaved-indicator" class="unsaved-indicator hidden" aria-live="polite">⚠ تغییرات ذخیره نشده</span>
          <button type="button" class="btn btn-danger hidden" id="delete-btn">حذف پروفایل</button>
        </div>
        <div id="validation-errors" class="validation-errors hidden"></div>
        <div class="row">
          <label for="field-name">نام پروفایل</label>
          <input type="text" id="field-name" maxlength="40" autocomplete="off">
        </div>
        <div class="row">
          <label for="field-color">رنگ</label>
          <div class="color-wrap">
            <input type="color" id="field-color" value="#48bb78">
            <span id="color-hex" class="color-hex">#48bb78</span>
          </div>
        </div>
        <fieldset class="toggles">
          <legend>ویژگی‌ها</legend>
          <label class="toggle-row">
            <span class="toggle-label">تبدیل تاریخ میلادی به شمسی</span>
            <input type="checkbox" id="field-dateConv" class="switch">
            <span class="switch-track"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">راست‌چین جملات فارسی</span>
            <input type="checkbox" id="field-persianRtl" class="switch">
            <span class="switch-track"></span>
          </label>
          <div class="row nested" id="minchars-row">
            <label for="field-minchars">حداقل تعداد کاراکتر فارسی برای راست‌چین</label>
            <input type="number" id="field-minchars" min="1" max="500" step="1" value="10">
          </div>
          <label class="toggle-row">
            <span class="toggle-label">راست‌چین کل صفحه (dir=rtl روی body)</span>
            <input type="checkbox" id="field-fullrtl" class="switch">
            <span class="switch-track"></span>
          </label>
        </fieldset>
        <div class="row">
          <label for="field-font">فونت</label>
          <div class="combobox" id="font-combobox">
            <input type="text" id="field-font" autocomplete="off" value="" placeholder="نام فونت (خالی = بدون فونت سفارشی)">
            <button type="button" class="combobox-btn" id="font-combobox-btn" tabindex="-1"
              aria-label="باز کردن لیست فونت">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <ul class="combobox-list hidden" id="font-combobox-list"></ul>
          </div>
        </div>
        <div class="row">
          <label for="field-whitelist">وایت‌لیست (هر الگو در یک خط — regex)</label>
          <textarea id="field-whitelist" rows="4" dir="ltr" placeholder="^example\\.com$"></textarea>
        </div>
        <div class="row">
          <label for="field-blacklist">بلک‌لیست (هر الگو در یک خط — regex)</label>
          <textarea id="field-blacklist" rows="4" dir="ltr" placeholder="^ads\\.example\\.com$"></textarea>
        </div>
      </form>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
    /* ---- MOCK chrome API ----
       Builds the same default state the extension would, then answers
       getProfiles / saveProfiles messages. Lets us preview the options page
       UI without loading the actual extension. */
    (function () {
      // Build default state by executing profiles.js data factory inline.
      // Easier: define a minimal state here that matches the schema.
      const SCHEMA_VERSION = 2;
      const OFF_ID = 'off';
      const DEFAULT_ID = 'default';
      const DEFAULT_FONT = 'Sahel';
      const DEFAULT_MIN_CHARS = 10;
      function defaultSettings() {
        return {
          dateConversion: false, persianRtl: false,
          minPersianChars: DEFAULT_MIN_CHARS, fullPageRtl: false,
          font: DEFAULT_FONT, blacklist: [], whitelist: []
        };
      }
      const builtins = {
        off: { id: OFF_ID, name: 'خاموش', builtin: true, deletable: false, editable: false, color: '#9e9e9e', settings: defaultSettings() },
        default: { id: DEFAULT_ID, name: 'پیش‌فرض', builtin: true, deletable: false, editable: true, color: '#4299e1', settings: Object.assign(defaultSettings(), { dateConversion: true, persianRtl: true }) },
        claude: { id: 'claude', name: 'سایت کلاد', builtin: true, deletable: true, editable: true, color: '#d97757', settings: Object.assign(defaultSettings(), { dateConversion: true, persianRtl: true, whitelist: ['^claude\\.ai$', '^.*\\.claude\\.ai$'] }) },
        chatgpt: { id: 'chatgpt', name: 'سایت چت‌جی‌پی‌تی', builtin: true, deletable: true, editable: true, color: '#10a37f', settings: defaultSettings() },
        copilot: { id: 'copilot', name: 'سایت گیتهاب کوپایلوت', builtin: true, deletable: true, editable: true, color: '#a371f0', settings: Object.assign(defaultSettings(), { dateConversion: true, persianRtl: true, fullPageRtl: true, whitelist: ['^github\\.com$'] }) },
        google: { id: 'google', name: 'سایت گوگل', builtin: true, deletable: true, editable: true, color: '#ea4335', settings: Object.assign(defaultSettings(), { persianRtl: true, whitelist: ['^google\\.com$'] }) }
      };
      // Add a couple of custom user profiles to show variety
      const user1Id = 'p_userdemo1';
      const user2Id = 'p_userdemo2';
      builtins[user1Id] = { id: user1Id, name: 'وبلاگ شخصی', builtin: false, deletable: true, editable: true, color: '#48bb78', settings: Object.assign(defaultSettings(), { dateConversion: true, persianRtl: true, font: 'Vazirmatn', whitelist: ['^myblog\\.ir$'] }) };
      builtins[user2Id] = { id: user2Id, name: 'داکیومنت‌های فارسی', builtin: false, deletable: true, editable: true, color: '#f38ba8', settings: Object.assign(defaultSettings(), { dateConversion: true, fullPageRtl: true, font: 'Shabnam', whitelist: ['^docs\\.example\\.com$'], blacklist: ['^ads\\.'] }) };

      const state = {
        schemaVersion: SCHEMA_VERSION,
        profiles: builtins,
        profileOrder: [OFF_ID, DEFAULT_ID, 'claude', 'chatgpt', 'copilot', 'google', user1Id, user2Id],
        activeProfileIds: [DEFAULT_ID],
        installDate: new Date().toISOString()
      };

      window.chrome = {
        runtime: {
          lastError: null,
          sendMessage: function (msg, cb) {
            if (msg.action === 'getProfiles') {
              setTimeout(() => cb({ success: true, state: JSON.parse(JSON.stringify(state)) }), 0);
            } else if (msg.action === 'saveProfiles') {
              Object.assign(state, msg.state);
              setTimeout(() => cb({ success: true, state: JSON.parse(JSON.stringify(state)) }), 0);
            } else {
              setTimeout(() => cb({ success: false }), 0);
            }
          }
        }
      };
    })();
  </script>
  <script src="profiles.js"></script>
  <script src="options.js"></script>
</body>

</html>
